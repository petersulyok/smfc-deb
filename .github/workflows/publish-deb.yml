name: Publish DEB package

on:
  repository_dispatch:
    types: [package-published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "smfc release tag"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Install reprepro and gnupg
        run: sudo apt-get update && sudo apt-get install -y reprepro gnupg

      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.REPO_SIGNING_GPG_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Resolve release tag
        id: tag
        run: echo "value=${{ github.event.client_payload.release_tag || inputs.release_tag }}" >> $GITHUB_OUTPUT

      - name: Download .deb from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/in
          gh release download "${{ steps.tag.outputs.value }}" -R petersulyok/smfc -p '*.deb' -D /tmp/in

      - name: Bootstrap gh-pages content
        run: |
          if [ ! -f smfc-repo.gpg ]; then
            git show origin/main:smfc-repo.gpg > smfc-repo.gpg
          fi
          mkdir -p conf
          cat > conf/distributions << 'EOF'
          Origin: smfc
          Label: smfc
          Codename: stable
          Suite: stable
          Components: main
          Architectures: amd64 arm64
          Description: smfc APT repository
          SignWith: 9E06E863D50D7541
          EOF

      - name: Add package to repository
        run: reprepro -b . includedeb stable /tmp/in/*.deb

      - name: Commit and push gh-pages
        run: |
          git config user.name "smfc-bot"
          git config user.email "smfc-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Publish ${{ steps.tag.outputs.value }}"
          git push origin gh-pages